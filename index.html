<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/test.svg" />
    <!-- viewport-fit=cover lets the app paint under notches/rounded corners in
         fullscreen kiosk mode. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- Force a light UI and opt out of TV/browser "auto dark theme", which was
         darkening the light backgrounds (header, Preparing, ad) to black while
         leaving the red Now Serving column intact. -->
    <meta name="color-scheme" content="light only" />
    <meta name="theme-color" content="#862433" />

    <!-- PWA: installs to the home screen and launches fullscreen with no
         browser/URL bar. Manifest drives Android; the apple-* tags cover iOS. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="application-name" content="MUJI Queue" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MUJI Queue" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <title>MUJI Queue</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
